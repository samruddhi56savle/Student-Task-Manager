<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>StudyDesk — Task Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f13;
    --surface: #17171e;
    --surface2: #1e1e28;
    --border: #2a2a38;
    --accent: #7c6aff;
    --accent2: #ff6a9d;
    --accent3: #6affd4;
    --text: #e8e8f0;
    --muted: #7070a0;
    --danger: #ff5c7c;
    --success: #4dffb0;
    --warn: #ffcc55;
    --radius: 14px;
    --tab-h: 52px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 16px 60px;
    overflow-x: hidden;
  }

  /* ─── BACKGROUND ─── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 10%, rgba(124,106,255,.18) 0%, transparent 70%),
      radial-gradient(ellipse 40% 40% at 85% 80%, rgba(255,106,157,.12) 0%, transparent 70%),
      radial-gradient(ellipse 50% 50% at 60% 30%, rgba(106,255,212,.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ─── HEADER ─── */
  header {
    width: 100%;
    max-width: 780px;
    padding: 44px 0 28px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    position: relative;
    z-index: 1;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 2.4rem;
    letter-spacing: -1px;
    background: linear-gradient(120deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .tagline {
    font-size: .9rem;
    color: var(--muted);
    font-weight: 300;
    letter-spacing: .3px;
  }

  /* ─── STATS BAR ─── */
  .stats-bar {
    width: 100%;
    max-width: 780px;
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    position: relative;
    z-index: 1;
    flex-wrap: wrap;
  }

  .stat-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 40px;
    padding: 8px 18px;
    font-size: .82rem;
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--muted);
    transition: border-color .2s;
  }

  .stat-chip strong { color: var(--text); font-family: 'Syne', sans-serif; font-size: 1rem; }
  .stat-chip .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot-all  { background: var(--accent); }
  .dot-done { background: var(--success); }
  .dot-pend { background: var(--warn); }

  /* ─── TABS ─── */
  .tabs-wrapper {
    width: 100%;
    max-width: 780px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 6px;
    display: flex;
    gap: 4px;
    position: relative;
    z-index: 1;
    margin-bottom: 20px;
  }

  .tab-btn {
    flex: 1;
    height: var(--tab-h);
    border: none;
    background: transparent;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-size: .85rem;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    letter-spacing: .5px;
    transition: color .2s, background .2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    position: relative;
  }

  .tab-btn svg { width: 16px; height: 16px; }

  .tab-btn.active {
    background: var(--surface2);
    color: var(--text);
    box-shadow: inset 0 0 0 1px var(--border);
  }

  .tab-btn.active.tab-all   { color: var(--accent); }
  .tab-btn.active.tab-pend  { color: var(--warn); }
  .tab-btn.active.tab-done  { color: var(--success); }

  .tab-count {
    background: var(--border);
    color: var(--muted);
    border-radius: 20px;
    padding: 1px 7px;
    font-size: .72rem;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
  }

  .tab-btn.active .tab-count {
    background: rgba(124,106,255,.18);
    color: var(--accent);
  }

  .tab-btn.active.tab-pend .tab-count  { background: rgba(255,204,85,.12); color: var(--warn); }
  .tab-btn.active.tab-done .tab-count  { background: rgba(77,255,176,.12); color: var(--success); }

  /* ─── ADD FORM ─── */
  .add-form {
    width: 100%;
    max-width: 780px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    position: relative;
    z-index: 1;
    margin-bottom: 20px;
  }

  .form-row { display: flex; gap: 10px; flex-wrap: wrap; }

  .add-form input, .add-form select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: .9rem;
    padding: 11px 14px;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }

  .add-form input:focus, .add-form select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,106,255,.12);
  }

  .input-task { flex: 1; min-width: 200px; }
  .input-subject { width: 160px; }
  .input-due { width: 150px; }
  .input-priority { width: 130px; }

  .add-form select option { background: var(--surface2); }

  .btn-add {
    background: linear-gradient(135deg, var(--accent), #5b4de8);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: .88rem;
    padding: 11px 24px;
    cursor: pointer;
    letter-spacing: .5px;
    transition: opacity .2s, transform .15s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn-add:hover { opacity: .9; transform: translateY(-1px); }
  .btn-add:active { transform: translateY(0); }

  /* ─── TASK LIST ─── */
  .task-list-wrap {
    width: 100%;
    max-width: 780px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    position: relative;
    z-index: 1;
  }

  /* empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: .95rem;
    display: none;
  }

  .empty-state .emoji { font-size: 3rem; display: block; margin-bottom: 14px; }

  /* task card */
  .task-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: border-color .2s, transform .15s, box-shadow .2s;
    animation: slideIn .3s ease both;
    cursor: default;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .task-card:hover {
    border-color: #3a3a50;
    box-shadow: 0 4px 20px rgba(0,0,0,.3);
    transform: translateY(-1px);
  }

  .task-card.done {
    opacity: .55;
  }

  .task-card.done .task-title {
    text-decoration: line-through;
    color: var(--muted);
  }

  /* checkbox */
  .check-btn {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: transparent;
    cursor: pointer;
    flex-shrink: 0;
    transition: background .2s, border-color .2s;
    display: flex; align-items: center; justify-content: center;
  }

  .check-btn:hover { border-color: var(--success); }
  .task-card.done .check-btn { background: var(--success); border-color: var(--success); }
  .check-btn svg { display: none; }
  .task-card.done .check-btn svg { display: block; }

  /* task info */
  .task-info { flex: 1; min-width: 0; }

  .task-title {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: .95rem;
    margin-bottom: 5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .task-meta {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }

  .badge {
    font-size: .72rem;
    padding: 2px 9px;
    border-radius: 20px;
    font-weight: 500;
    letter-spacing: .3px;
  }

  .badge-subject { background: rgba(124,106,255,.15); color: var(--accent); }
  .badge-due     { background: rgba(112,112,160,.12); color: var(--muted); display: flex; gap: 4px; align-items: center; }

  .priority-dot {
    width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
  }
  .p-high   { background: var(--danger); }
  .p-medium { background: var(--warn); }
  .p-low    { background: var(--success); }

  .priority-label {
    font-size: .72rem;
    font-weight: 500;
  }
  .p-high-text   { color: var(--danger); }
  .p-medium-text { color: var(--warn); }
  .p-low-text    { color: var(--success); }

  /* delete btn */
  .del-btn {
    background: transparent;
    border: 1px solid transparent;
    border-radius: 8px;
    color: var(--muted);
    cursor: pointer;
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: color .2s, border-color .2s, background .2s;
  }

  .del-btn:hover { color: var(--danger); border-color: rgba(255,92,124,.3); background: rgba(255,92,124,.08); }

  /* ─── TOAST ─── */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 40px;
    padding: 10px 22px;
    font-size: .85rem;
    color: var(--text);
    z-index: 999;
    transition: transform .3s ease, opacity .3s;
    opacity: 0;
    pointer-events: none;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* ─── PROGRESS BAR ─── */
  .progress-wrap {
    width: 100%;
    max-width: 780px;
    margin-bottom: 20px;
    position: relative;
    z-index: 1;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: .78rem;
    color: var(--muted);
    margin-bottom: 7px;
  }

  .progress-track {
    width: 100%;
    height: 6px;
    background: var(--surface2);
    border-radius: 10px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    border-radius: 10px;
    transition: width .5s ease;
    width: 0%;
  }

  /* ─── SEARCH BAR ─── */
  .search-row {
    width: 100%;
    max-width: 780px;
    position: relative;
    z-index: 1;
    margin-bottom: 14px;
  }

  .search-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px 11px 40px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: .9rem;
    outline: none;
    transition: border-color .2s;
  }

  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); }

  .search-icon {
    position: absolute;
    left: 13px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }

  /* ─── SORT ─── */
  .sort-row {
    width: 100%;
    max-width: 780px;
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 16px;
    position: relative;
    z-index: 1;
  }

  .sort-label { font-size: .78rem; color: var(--muted); margin-right: 4px; }

  .sort-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: .78rem;
    color: var(--muted);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: color .2s, border-color .2s, background .2s;
  }

  .sort-chip.active { color: var(--accent); border-color: var(--accent); background: rgba(124,106,255,.08); }

  @media (max-width: 600px) {
    .logo { font-size: 1.8rem; }
    .input-subject, .input-due, .input-priority { width: 100%; }
    .tab-btn { font-size: .78rem; gap: 4px; }
  }
</style>
</head>
<body>

<!-- ─── HEADER ─── -->
<header>
  <div class="logo">StudyDesk</div>
  <div class="tagline">Your personal academic task manager — stay on top, always.</div>
</header>

<!-- ─── STATS ─── -->
<div class="stats-bar">
  <div class="stat-chip"><span class="dot dot-all"></span>Total <strong id="statTotal">0</strong> tasks</div>
  <div class="stat-chip"><span class="dot dot-done"></span>Done <strong id="statDone">0</strong></div>
  <div class="stat-chip"><span class="dot dot-pend"></span>Pending <strong id="statPend">0</strong></div>
</div>

<!-- ─── PROGRESS ─── -->
<div class="progress-wrap">
  <div class="progress-label">
    <span>Completion Progress</span>
    <span id="progPct">0%</span>
  </div>
  <div class="progress-track">
    <div class="progress-fill" id="progressFill"></div>
  </div>
</div>

<!-- ─── TABS ─── -->
<div class="tabs-wrapper">
  <button class="tab-btn tab-all active" data-tab="all" onclick="switchTab('all')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M9 12l2 2 4-4"/></svg>
    All Tasks <span class="tab-count" id="cntAll">0</span>
  </button>
  <button class="tab-btn tab-pend" data-tab="pending" onclick="switchTab('pending')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
    Pending <span class="tab-count" id="cntPend">0</span>
  </button>
  <button class="tab-btn tab-done" data-tab="done" onclick="switchTab('done')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>
    Completed <span class="tab-count" id="cntDone">0</span>
  </button>
</div>

<!-- ─── ADD FORM ─── -->
<div class="add-form">
  <div class="form-row">
    <input class="input-task" type="text" id="inputTask" placeholder="✏️  Add a new task…" />
    <input class="input-subject" type="text" id="inputSubject" placeholder="Subject / Course" />
  </div>
  <div class="form-row">
    <select class="input-priority" id="inputPriority">
      <option value="high">🔴 High Priority</option>
      <option value="medium" selected>🟡 Medium Priority</option>
      <option value="low">🟢 Low Priority</option>
    </select>
    <button class="btn-add" onclick="addTask()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 5v14M5 12h14"/></svg>
      Add Task
    </button>
  </div>
</div>

<!-- ─── SEARCH ─── -->
<div class="search-row">
  <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
  <input class="search-input" type="text" id="searchInput" placeholder="Search tasks…" oninput="renderTasks()" />
</div>

<!-- ─── SORT ─── -->
<div class="sort-row">
  <span class="sort-label">Sort:</span>
  <button class="sort-chip active" data-sort="date" onclick="setSort('date')">Newest</button>
  <button class="sort-chip" data-sort="priority" onclick="setSort('priority')">Priority</button>
  <button class="sort-chip" data-sort="due" onclick="setSort('due')">Due Date</button>
  <button class="sort-chip" data-sort="subject" onclick="setSort('subject')">Subject</button>
</div>

<!-- ─── TASK LIST ─── -->
<div class="task-list-wrap" id="taskList">
  <div class="empty-state" id="emptyState">
    <span class="emoji">📚</span>
    No tasks here yet.<br/>Add one above to get started!
  </div>
</div>

<!-- ─── TOAST ─── -->
<div class="toast" id="toast"></div>

<script>
  let tasks = JSON.parse(localStorage.getItem('studydesk_tasks') || '[]');
  let currentTab = 'all';
  let currentSort = 'date';

  // ── SAVE ──
  function save() {
    localStorage.setItem('studydesk_tasks', JSON.stringify(tasks));
  }

  // ── ADD ──
  function addTask() {
    const title = document.getElementById('inputTask').value.trim();
    if (!title) { showToast('⚠️ Please enter a task name.'); return; }
    const task = {
      id: Date.now(),
      title,
      subject: document.getElementById('inputSubject').value.trim() || 'General',
      due: document.getElementById('inputDue').value,
      priority: document.getElementById('inputPriority').value,
      done: false,
      createdAt: Date.now()
    };
    tasks.unshift(task);
    save(); renderTasks(); updateStats();
    document.getElementById('inputTask').value = '';
    showToast('✅ Task added!');
  }

  // ── DELETE ──
  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    save(); renderTasks(); updateStats();
    showToast('🗑️ Task removed.');
  }

  // ── TOGGLE ──
  function toggleTask(id) {
    const t = tasks.find(t => t.id === id);
    if (t) { t.done = !t.done; }
    save(); renderTasks(); updateStats();
    showToast(t.done ? '🎉 Marked complete!' : '↩️ Marked pending.');
  }

  // ── SWITCH TAB ──
  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
    renderTasks();
  }

  // ── SORT ──
  function setSort(s) {
    currentSort = s;
    document.querySelectorAll('.sort-chip').forEach(c => c.classList.toggle('active', c.dataset.sort === s));
    renderTasks();
  }

  // ── RENDER ──
  function renderTasks() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    let list = tasks.filter(t => {
      if (currentTab === 'pending'  && t.done)  return false;
      if (currentTab === 'done'     && !t.done) return false;
      if (q && !t.title.toLowerCase().includes(q) && !t.subject.toLowerCase().includes(q)) return false;
      return true;
    });

    // sort
    const pOrder = { high: 0, medium: 1, low: 2 };
    if (currentSort === 'priority') list.sort((a,b) => pOrder[a.priority] - pOrder[b.priority]);
    else if (currentSort === 'due') list.sort((a,b) => (a.due || '9999') < (b.due || '9999') ? -1 : 1);
    else if (currentSort === 'subject') list.sort((a,b) => a.subject.localeCompare(b.subject));
    else list.sort((a,b) => b.createdAt - a.createdAt);

    const container = document.getElementById('taskList');
    const empty = document.getElementById('emptyState');

    // remove old cards (keep empty state)
    container.querySelectorAll('.task-card').forEach(c => c.remove());

    if (list.length === 0) {
      empty.style.display = 'block';
      empty.querySelector('.emoji').textContent = currentTab === 'done' ? '🏆' : currentTab === 'pending' ? '🎯' : '📚';
      empty.innerHTML = `<span class="emoji">${currentTab === 'done' ? '🏆' : currentTab === 'pending' ? '🎯' : '📚'}</span>
        ${currentTab === 'done' ? 'No completed tasks yet.' : currentTab === 'pending' ? 'All caught up! No pending tasks.' : 'No tasks yet. Add one above!'}`;
      return;
    }

    empty.style.display = 'none';

    list.forEach((t, i) => {
      const card = document.createElement('div');
      card.className = 'task-card' + (t.done ? ' done' : '');
      card.style.animationDelay = (i * 40) + 'ms';

      const dueStr = t.due ? formatDue(t.due) : '';
      const pClass = t.priority;
      const pLabel = t.priority.charAt(0).toUpperCase() + t.priority.slice(1);

      card.innerHTML = `
        <button class="check-btn" onclick="toggleTask(${t.id})" title="Toggle complete">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg>
        </button>
        <div class="task-info">
          <div class="task-title">${escHtml(t.title)}</div>
          <div class="task-meta">
            <span class="badge badge-subject">${escHtml(t.subject)}</span>
            ${dueStr ? `<span class="badge badge-due">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
              ${dueStr}
            </span>` : ''}
            <span class="priority-dot p-${pClass}"></span>
            <span class="priority-label p-${pClass}-text">${pLabel}</span>
          </div>
        </div>
        <button class="del-btn" onclick="deleteTask(${t.id})" title="Delete task">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/>
          </svg>
        </button>
      `;
      container.appendChild(card);
    });
  }

  // ── STATS ──
  function updateStats() {
    const total = tasks.length;
    const done = tasks.filter(t => t.done).length;
    const pend = total - done;
    const pct = total ? Math.round((done / total) * 100) : 0;

    document.getElementById('statTotal').textContent = total;
    document.getElementById('statDone').textContent  = done;
    document.getElementById('statPend').textContent  = pend;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progPct').textContent = pct + '%';

    document.getElementById('cntAll').textContent  = total;
    document.getElementById('cntPend').textContent = pend;
    document.getElementById('cntDone').textContent = done;
  }

  // ── HELPERS ──
  function formatDue(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: '2-digit' });
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2400);
  }

  // ── ENTER KEY ──
  document.getElementById('inputTask').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

  // ── SEED DATA ──
  if (tasks.length === 0) {
    tasks = [
      { id: 1, title: 'Complete Math Assignment — Chapter 7', subject: 'Mathematics', due: '2026-04-25', priority: 'high', done: false, createdAt: Date.now()-5000 },
      { id: 2, title: 'Read History textbook pages 120–145', subject: 'History', due: '2026-04-23', priority: 'medium', done: false, createdAt: Date.now()-4000 },
      { id: 3, title: 'Submit Physics Lab Report', subject: 'Physics', due: '2026-04-22', priority: 'high', done: true, createdAt: Date.now()-3000 },
      { id: 4, title: 'Prepare presentation slides', subject: 'English', due: '2026-04-30', priority: 'low', done: false, createdAt: Date.now()-2000 },
    ];
    save();
  }

  // ── INIT ──
  renderTasks();
  updateStats();
</script>
</body>
</html>
